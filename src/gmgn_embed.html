<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>GMGN Embed</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #09090b; }
        iframe { width: 100%; height: 100%; border: none; }
        .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #a1a1aa; font-family: sans-serif; font-size: 12px; pointer-events: none; }
        .controls { position: absolute; bottom: 10px; right: 10px; z-index: 10; opacity: 0.8; transition: opacity 0.2s; }
        .controls:hover { opacity: 1; }
        .btn-external { background: rgba(0,0,0,0.6); color: #fff; padding: 4px 8px; border-radius: 4px; text-decoration: none; font-size: 10px; font-family: sans-serif; border: 1px solid #333; backdrop-filter: blur(4px); }
    </style>
</head>
<body>
    <div class="loading">Loading GMGN...</div>
    <div class="controls">
        <a id="ext-link" href="#" target="_blank" class="btn-external">Open External ↗</a>
    </div>
    <script src="gmgn_embed.js"></script>
</body>
</html>
